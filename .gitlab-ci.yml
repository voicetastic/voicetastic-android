# GitLab CI/CD for Voicetastic — runs unit tests + Android lint, builds debug
# & release APKs.
#
# Toolchain:
#   - JDK 21 (required by AGP 9.x / Gradle 9.x)
#   - Android command-line tools, platform-tools, platforms;android-36, build-tools;36.0.0
#
# Pipeline shape (DAG):
#   test stage         build stage          package stage
#   ┌──────────────┐
#   │ unit-tests   │──┐
#   └──────────────┘  │   ┌─────────────────┐
#                     ├──▶│ assemble-debug  │
#   ┌──────────────┐  │   └─────────────────┘
#   │ lint         │──┤
#   └──────────────┘  │   ┌─────────────────┐
#                     └──▶│ assemble-release│ (tags / main only)
#                         └─────────────────┘
#
# Cache strategy:
#   - Two separate caches: Android SDK (rarely changes) + Gradle deps.
#   - `unit-tests` writes (`pull-push`); all other jobs read-only (`pull`)
#     so we don't re-upload large caches multiple times per pipeline.
#
# ---------------------------------------------------------------------------
# !!  KNOWN INFRASTRUCTURE ISSUE — RUNNER `runner-android bKHg0aHo0`  !!
# ---------------------------------------------------------------------------
# The self-hosted runner is enforcing a ~10-second hard wall-clock kill on
# every individual script line (every `- ...` in script / before_script).
# This was proven empirically (8 pipeline runs, 2026-05-10):
#   - Any line that completes in <10 s succeeds.
#   - `sleep 30` is killed at 9.8 s.
#   - `./gradlew …` is killed at 10 s, regardless of memory / output / JVM args.
# Memory is not the cause — the JVM was at 720 MB RSS on a host with
# 18 GB free, with `memory.max: max` and `pids.max: 38102` in our cgroup,
# at the moment of SIGKILL.
#
# Until the runner host admin removes the per-command timeout (see
# `/etc/gitlab-runner/config.toml` and any `pre_*_script` wrappers, plus
# `RUNNER_SCRIPT_TIMEOUT` and `[runners.docker] kill_after_timeout`),
# NO Gradle build can complete on this runner. There is no `.gitlab-ci.yml`
# workaround.
# ---------------------------------------------------------------------------
#
# Optional CI/CD variables for signing the release APK (set as protected/masked):
#   ANDROID_KEYSTORE_BASE64  – base64-encoded keystore (.jks/.keystore)
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# If any of those are missing, the release job still runs but produces an unsigned APK.

stages:
  - test
  - build
  - release   # auto-bump semver tag from conventional commits
  - package

variables:
  # --- Versions (keep in sync with app/build.gradle.kts and gradle-wrapper.properties) ---
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_CMDLINE_TOOLS_VERSION: "11076708"   # cmdline-tools rev 13.0
  # NDK version installed via sdkmanager. Used by the Rust bridge to
  # cross-compile `libvoicetastic.so` for arm64-v8a / x86_64 (see
  # app/build.gradle.kts -> rustAbis). Bump in lockstep with what local
  # devs install through Android Studio.
  ANDROID_NDK_VERSION: "27.0.12077973"
  # --- Paths (cacheable, must live under $CI_PROJECT_DIR for GitLab cache to pick them up) ---
  ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/.android-sdk"
  ANDROID_NDK_HOME: "$CI_PROJECT_DIR/.android-sdk/ndk/27.0.12077973"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  # `voicetastic-core/build.rs` (via prost-build) needs to resolve the
  # well-known `google/protobuf/descriptor.proto`, imported by
  # Meshtastic's `nanopb.proto`. Ubuntu's `libprotobuf-dev` ships it
  # under `/usr/include/google/protobuf/`. prost-build honours
  # `PROTOC_INCLUDE` for the lookup path.
  PROTOC_INCLUDE: "/usr/include"
  # 3 GB heap fits AGP 9.x lint + Compose + Kotlin in-process.
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+ExitOnOutOfMemoryError -Dkotlin.compiler.execution.strategy=in-process"
  # Pull in the voicetastic-desktop submodule (Rust crates + .udl) so the
  # uniffiBindgen and cargoBuild<Abi> tasks have something to operate on.
  # Without this, the runner logs `Skipping Git submodules setup` and the
  # Gradle Exec tasks fail with "input file does not exist".
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: "1"
  # `.gitmodules` declares the submodule URL with the SSH form
  # (`git@git.cha-sam.re:…`) so local developers don't need an HTTPS
  # token. The runner image has neither ssh nor a deploy key, so let
  # GitLab rewrite it on-the-fly to HTTPS and auth with `CI_JOB_TOKEN`.
  #
  # Requires the sibling project `voicetastic-desktop` to allow this
  # project in its **Settings → CI/CD → Job token permissions**
  # allowlist; otherwise the clone fails with 404.
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  # --- Cache transfer perf ---
  FF_USE_FASTZIP: "true"
  TRANSFER_METER_FREQUENCY: "5s"
  ARTIFACT_COMPRESSION_LEVEL: "fast"
  CACHE_COMPRESSION_LEVEL: "fast"

# Cancel superseded pipelines (e.g. when force-pushing to an MR branch).
# NOTE: cancellation appears in job logs as `exit code 137` (SIGKILL),
# indistinguishable from a kernel OOM kill or the runner timeout described
# at the top of this file. When debugging, rule those out before assuming
# memory pressure.
default:
  tags:
    - linux
    - docker
    - android
  interruptible: true

# Reusable bootstrap: install JDK + Android SDK, accept licenses, install components.
.android-setup: &android-setup
  image: eclipse-temurin:21-jdk
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends unzip wget ca-certificates curl build-essential protobuf-compiler libprotobuf-dev
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - |
      if [ ! -d "$ANDROID_SDK_ROOT/cmdline-tools/latest" ]; then
        echo "Installing Android command-line tools…"
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_CMDLINE_TOOLS_VERSION}_latest.zip" -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
        rm /tmp/cmdline-tools.zip
      fi
    - export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - yes | sdkmanager --licenses > /dev/null 2>&1 || true
    - sdkmanager --install "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}" > /dev/null
    # --- Rust toolchain (needed by uniffiBindgen + cargoBuild<Abi>) ----------
    # Installed under $CARGO_HOME / $RUSTUP_HOME so the directories are
    # part of $CI_PROJECT_DIR and get cached by the gradle-deps cache key.
    - |
      if [ ! -x "$CARGO_HOME/bin/cargo" ]; then
        echo "Installing Rust stable + Android targets…"
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
          sh -s -- -y --default-toolchain stable --profile minimal \
                   --target aarch64-linux-android --target x86_64-linux-android
      fi
    - export PATH="$CARGO_HOME/bin:$PATH"
    - rustup target add aarch64-linux-android x86_64-linux-android > /dev/null
    - chmod +x ./gradlew

# ---------------------------------------------------------------------------
# Cache strategy
#   Two caches per job:
#     1. Android SDK — stable, keyed only on cmdline-tools version. Rarely
#        changes, so we keep a single global cache shared across branches.
#     2. Gradle deps — keyed on wrapper + version catalog. Updated whenever a
#        dependency changes.
#   The `lint` job (test stage) writes both caches (`pull-push`).
#   Downstream jobs only read them (`pull`) — this avoids re-uploading large
#   caches from every job in the pipeline.
# ---------------------------------------------------------------------------
.cache-rw: &cache-rw
  cache:
    - key: "android-sdk-${ANDROID_CMDLINE_TOOLS_VERSION}-ndk-${ANDROID_NDK_VERSION}"
      paths:
        - .android-sdk
      policy: pull-push
    # GitLab caps `files:` at 2 entries -- pick the two that actually
    # change the dep graph: the Gradle version catalog and the Rust
    # lockfile. The wrapper version is rarely touched and changing it
    # without bumping deps shouldn't invalidate this cache anyway.
    - key:
        files:
          - gradle/libs.versions.toml
          - third_party/voicetastic-desktop/Cargo.lock
      paths:
        - .gradle/caches
        - .gradle/wrapper
        - .cargo
        - .rustup
        - third_party/voicetastic-desktop/target-android
        - app/build/intermediates/aar_metadata_check
      policy: pull-push

.cache-ro: &cache-ro
  cache:
    - key: "android-sdk-${ANDROID_CMDLINE_TOOLS_VERSION}-ndk-${ANDROID_NDK_VERSION}"
      paths:
        - .android-sdk
      policy: pull
    - key:
        files:
          - gradle/libs.versions.toml
          - third_party/voicetastic-desktop/Cargo.lock
      paths:
        - .gradle/caches
        - .gradle/wrapper
        - .cargo
        - .rustup
        - third_party/voicetastic-desktop/target-android
        - app/build/intermediates/aar_metadata_check
      policy: pull

# ----------------------------------------------------------------------------
# Stage: test — Android lint (quality gate, runs FIRST).
# Order rationale: lint is a fast-failing static check; if it fails the
# code shouldn't even be compiled/tested. It also writes the shared caches
# (`pull-push`) so downstream jobs can reuse them read-only.
# ----------------------------------------------------------------------------
lint:
  stage: test
  <<: [*android-setup, *cache-rw]
  script:
    - ./gradlew --no-daemon :app:lintDebug
  artifacts:
    when: always
    paths:
      - app/build/reports/lint-results-debug.html
      - app/build/reports/lint-results-debug.xml
      - app/build/reports/lint-results-debug.sarif
    expire_in: 1 week

# ----------------------------------------------------------------------------
# Stage: test — unit tests (runs after lint passes).
# ----------------------------------------------------------------------------
unit-tests:
  stage: test
  <<: [*android-setup, *cache-ro]
  needs:
    - job: lint
      artifacts: false
  script:
    - ./gradlew --no-daemon :app:testDebugUnitTest
  artifacts:
    when: always
    reports:
      junit:
        - app/build/test-results/testDebugUnitTest/TEST-*.xml
    paths:
      - app/build/reports/tests/
    expire_in: 1 week

# ----------------------------------------------------------------------------
# Stage: build — debug APK (always built, on every branch and MR)
# ----------------------------------------------------------------------------
assemble-debug:
  stage: build
  <<: [*android-setup, *cache-ro]
  needs:
    - job: unit-tests
      artifacts: false
  script:
    - ./gradlew --no-daemon :app:assembleDebug
  artifacts:
    name: "voicetastic-debug-${CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 4 weeks

# ----------------------------------------------------------------------------
# Stage: release — auto-bump semver from conventional commits.
#
# Runs on main only. Scans commits since the latest `vX.Y.Z` tag and decides:
#   - any `<type>!:` or `BREAKING CHANGE:` footer → major
#   - any `feat:`                                → minor
#   - any `fix:`                                 → patch
#   - nothing matching                           → no tag, job exits 0
#
# When it bumps, it pushes `vX.Y.Z` back to the repo, which triggers a fresh
# tag pipeline. That tag pipeline runs `assemble-release` automatically and
# the APK ships with `versionName=X.Y.Z` (and `versionCode=$CI_PIPELINE_IID`).
#
# Setup (one time):
#   1. Settings → Access Tokens → create a project access token
#      - Role: Maintainer (needed to push tags to a protected ref)
#      - Scope: `write_repository`
#   2. Settings → CI/CD → Variables → add `CI_PUSH_TOKEN` (masked, protected)
#      with the token value.
#   3. Settings → Repository → Protected tags → allow `v*` for Maintainers
#      (or the role of the bot user) so the push isn't rejected.
#
# Without `$CI_PUSH_TOKEN` the rule below skips the job — pipelines still pass.
# ----------------------------------------------------------------------------
release-tag:
  stage: release
  image: alpine:3.20
  needs:
    - job: unit-tests
      artifacts: false
    - job: assemble-debug
      artifacts: false
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PUSH_TOKEN'
      when: on_success
  # Need full history to `git log <last-tag>..HEAD`.
  variables:
    GIT_DEPTH: "0"
    GIT_SUBMODULE_STRATEGY: none
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      git config user.email "ci@${CI_SERVER_HOST}"
      git config user.name "GitLab Release Bot"
      git fetch --tags --quiet

      LAST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
      LAST=${LAST:-v0.0.0}
      VER=${LAST#v}
      MAJ=$(echo "$VER" | cut -d. -f1)
      MIN=$(echo "$VER" | cut -d. -f2)
      PAT=$(echo "$VER" | cut -d. -f3)

      if [ "$LAST" = "v0.0.0" ]; then RANGE="HEAD"; else RANGE="${LAST}..HEAD"; fi

      MSGS=$(git log "$RANGE" --pretty=format:'%s%n%b%n---END---')
      BUMP=none
      # Precedence: major > minor > patch. Scan once, take the highest.
      if echo "$MSGS" | grep -qE '^[a-z]+(\([^)]+\))?!:|^BREAKING CHANGE:'; then
        BUMP=major
      elif echo "$MSGS" | grep -qE '^feat(\([^)]+\))?:'; then
        BUMP=minor
      elif echo "$MSGS" | grep -qE '^fix(\([^)]+\))?:'; then
        BUMP=patch
      fi

      if [ "$BUMP" = none ]; then
        echo "No releasable commits since $LAST. Skipping."
        exit 0
      fi

      case "$BUMP" in
        major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
        minor) MIN=$((MIN+1)); PAT=0 ;;
        patch) PAT=$((PAT+1)) ;;
      esac
      NEW="v${MAJ}.${MIN}.${PAT}"
      echo "Bump $BUMP: $LAST → $NEW"

      git tag -a "$NEW" -m "Release $NEW (auto, $BUMP bump from $LAST)"
      git push "https://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$NEW"

# ----------------------------------------------------------------------------
# Stage: package — release APK (only on tags / main branch)
# ----------------------------------------------------------------------------
assemble-release:
  stage: package
  <<: [*android-setup, *cache-ro]
  # Release jobs run on protected refs and may need to be allowed to finish
  # even if the user starts a newer pipeline.
  interruptible: false
  needs:
    - job: unit-tests
      artifacts: false
    - job: lint
      artifacts: false
  script:
    - |
      if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] \
         && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
        echo "Signing keystore detected — building signed release APK."
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$CI_PROJECT_DIR/release.keystore"
        export RELEASE_STORE_FILE="$CI_PROJECT_DIR/release.keystore"
        export RELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
        export RELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS"
        export RELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
      else
        echo "No signing credentials provided — release APK will be unsigned."
      fi
    - ./gradlew --no-daemon :app:assembleRelease
    - rm -f "$CI_PROJECT_DIR/release.keystore"
  artifacts:
    name: "voicetastic-release-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/release/*.apk
    expire_in: 12 weeks
  rules:
    # Auto: tag push (`v1.2.3`). Version comes from `$CI_COMMIT_TAG`.
    - if: '$CI_COMMIT_TAG'
    # Manual via "Run pipeline" form with RELEASE_VERSION=1.2.3 set.
    # Runs on any ref so you can cut a release from a hotfix branch too.
    - if: '$RELEASE_VERSION'
      when: manual
      allow_failure: true
    # Manual play button on main pipelines (smoke test only — no semver,
    # APK will be tagged 0.0.0 / code 1).
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true

# ----------------------------------------------------------------------------
# Stage: package — publish the signed APK as a GitLab Release asset.
#
# Uploads the APK from `assemble-release` to the project's Generic Package
# Registry (no expiry, unlike job artifacts) and creates a Release tied to
# the tag, with the package linked as a download with a stable `filepath`.
#
# Stable URLs the site can embed (work without auth iff project is public):
#   - Always-latest:
#       $CI_SERVER_URL/$CI_PROJECT_PATH/-/releases/permalink/latest/downloads/voicetastic.apk
#   - Pinned version:
#       $CI_SERVER_URL/$CI_PROJECT_PATH/-/releases/v1.2.3/downloads/voicetastic.apk
#
# Only runs on tag pipelines — i.e. after the `release-tag` bot (or a manual
# tag push) has produced a `vX.Y.Z` ref.
# ----------------------------------------------------------------------------
publish-release:
  stage: package
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - job: assemble-release
      artifacts: true
  variables:
    GIT_SUBMODULE_STRATEGY: none
    # Full history so `git log <prev-tag>..<current-tag>` works.
    GIT_DEPTH: "0"
  script:
    - apk add --no-cache curl git > /dev/null
    - |
      set -eu
      APK=$(ls app/build/outputs/apk/release/*.apk | head -n1)
      if [ -z "$APK" ]; then
        echo "No APK found in app/build/outputs/apk/release/"; exit 1
      fi
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/voicetastic/${CI_COMMIT_TAG}/voicetastic.apk"
      echo "Uploading $APK → $PKG_URL"
      # `--upload-file` does a PUT, which is what the generic registry expects.
      curl --fail --silent --show-error \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "$APK" \
        "$PKG_URL"
      echo "Upload OK."
    - |
      set -eu
      # ---- Generate release notes from conventional commits ----
      # Range: previous semver tag (highest, excluding current) → current tag.
      # No previous tag → log from the very first commit.
      git fetch --tags --quiet
      PREV=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
             | grep -v "^${CI_COMMIT_TAG}\$" | head -n1 || true)
      RANGE="${PREV:+${PREV}..}${CI_COMMIT_TAG}"
      echo "Generating notes for range: ${RANGE}"

      # Emit a markdown section IF the grep pattern matches any commit subjects
      # in $RANGE. Title becomes the H3; matching `<short-sha> <subject>` lines
      # become bullets.
      section() {
        title=$1; pat=$2
        lines=$(git log "$RANGE" --no-merges --pretty=format:'%h %s' \
                | grep -E "$pat" || true)
        [ -z "$lines" ] && return 0
        printf '\n### %s\n\n' "$title"
        echo "$lines" | sed 's/^/- /'
      }

      {
        if [ -n "$PREV" ]; then
          echo "Changes since [\`$PREV\`]($CI_PROJECT_URL/-/releases/$PREV)."
        else
          echo "First release."
        fi
        # Order matters — readers care about breakage first.
        # `feat:` / `fix:` patterns end with `:` (not `!:`), so a `feat!:`
        # commit lands in Breaking only, not also in Features.
        section "Breaking changes" '^[a-z]+(\([^)]+\))?!:'
        section "Features"         '^feat(\([^)]+\))?:'
        section "Fixes"            '^fix(\([^)]+\))?:'
        section "Performance"      '^perf(\([^)]+\))?:'
        section "Refactoring"      '^refactor(\([^)]+\))?:'
        if [ -n "$PREV" ]; then
          printf '\n**Full diff:** %s/-/compare/%s...%s\n' \
            "$CI_PROJECT_URL" "$PREV" "$CI_COMMIT_TAG"
        fi
      } > release-notes.md

      echo "--- release-notes.md ---"
      cat release-notes.md
      echo "--- end notes ---"
    - |
      set -eu
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/voicetastic/${CI_COMMIT_TAG}/voicetastic.apk"
      # Create the Release via release-cli (called explicitly, not via the
      # `release:` YAML keyword, because we need a multi-line description
      # read from a file).
      release-cli create \
        --tag-name   "$CI_COMMIT_TAG" \
        --name       "Voicetastic $CI_COMMIT_TAG" \
        --description "$(cat release-notes.md)" \
        --assets-link "{\"name\":\"voicetastic.apk\",\"url\":\"$PKG_URL\",\"filepath\":\"/voicetastic.apk\",\"link_type\":\"package\"}"

